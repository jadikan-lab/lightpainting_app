<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Lightpainting" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
  <title>Lightpainting</title>
</head>
<body>
  <div id="app">

    <!-- Viewfinder screen -->
    <main id="screen-camera" class="screen" data-screen="camera">
      <div class="viewfinder-wrap">
        <video id="viewfinder" autoplay playsinline muted></video>
        <canvas id="accumulator"></canvas>
        <div id="grid-overlay" class="grid-overlay" hidden aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
        <div id="rec-indicator" class="rec-indicator" hidden>
          <span class="rec-dot"></span>
          <span id="rec-timer">00:00</span>
        </div>
        <p id="camera-status" class="camera-status" hidden></p>
      </div>

      <div class="hud-top safe-top">
        <button id="btn-switch-camera" class="icon-btn" type="button" aria-label="Changer de caméra">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M17 2l3 3-3 3M20 5H8a5 5 0 0 0-5 5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M7 22l-3-3 3-3M4 19h12a5 5 0 0 0 5-5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="hud-top-right">
          <span id="res-badge" class="res-badge"></span>
          <button id="btn-settings" class="icon-btn" type="button" aria-label="Paramètres">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
              <line x1="4" y1="6" x2="20" y2="6" stroke-linecap="round"/>
              <circle cx="15" cy="6" r="2"/>
              <line x1="4" y1="12" x2="20" y2="12" stroke-linecap="round"/>
              <circle cx="9" cy="12" r="2"/>
              <line x1="4" y1="18" x2="20" y2="18" stroke-linecap="round"/>
              <circle cx="17" cy="18" r="2"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="hud-bottom safe-bottom">
        <button id="btn-gallery" class="thumb-btn" type="button" aria-label="Ouvrir la galerie">
          <img id="thumb-latest" alt="" hidden />
        </button>

        <button id="btn-shutter" class="shutter-btn" type="button" aria-label="Démarrer la capture">
          <span class="shutter-ring"></span>
        </button>

        <div class="hud-bottom-spacer" aria-hidden="true"></div>
      </div>
    </main>

    <!-- Gallery grid -->
    <section id="screen-gallery" class="screen" data-screen="gallery" hidden>
      <header id="gallery-header" class="screen-header safe-top">
        <button id="btn-gallery-close" class="icon-btn" type="button" aria-label="Fermer la galerie">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/>
          </svg>
        </button>
        <h1>Galerie</h1>
        <span class="header-spacer"></span>
      </header>
      <header id="gallery-selection-bar" class="screen-header selection-bar safe-top" hidden>
        <button id="btn-selection-cancel" class="icon-btn" type="button" aria-label="Annuler la sélection">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/>
          </svg>
        </button>
        <span id="selection-count" class="selection-count">0 sélectionné</span>
        <div class="selection-actions">
          <button id="btn-selection-all" class="text-btn" type="button">Tout</button>
          <button id="btn-selection-delete" class="icon-btn icon-btn-danger" type="button" aria-label="Supprimer la sélection">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M4 7h16M9 7V4h6v3M6 7l1 14h10l1-14" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </header>
      <div id="gallery-grid" class="gallery-grid"></div>
      <p id="gallery-empty" class="gallery-empty" hidden>Aucune capture pour l'instant.</p>
    </section>

    <!-- Fullscreen media viewer -->
    <section id="screen-viewer" class="screen" data-screen="viewer" hidden>
      <header class="screen-header safe-top">
        <button id="btn-viewer-close" class="icon-btn" type="button" aria-label="Retour">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M15 5l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="header-spacer"></span>
        <button id="btn-viewer-delete" class="icon-btn" type="button" aria-label="Supprimer">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M4 7h16M9 7V4h6v3M6 7l1 14h10l1-14" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </header>
      <div id="viewer-media" class="viewer-media"></div>
      <div class="viewer-actions safe-bottom">
        <button id="btn-viewer-export" class="pill-btn" type="button">Exporter</button>
      </div>
    </section>

    <!-- Paramètres -->
    <section id="screen-settings" class="screen" data-screen="settings" hidden>
      <header class="screen-header safe-top">
        <button id="btn-settings-close" class="icon-btn" type="button" aria-label="Retour">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M15 5l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <h1>Paramètres</h1>
        <span class="header-spacer"></span>
      </header>

      <div class="settings-list safe-bottom">
        <div class="settings-section">
          <h2 class="settings-section-title">Capture</h2>

          <label class="settings-row">
            <span class="settings-row-label">
              Vidéo du processus
              <span class="settings-row-hint">Ralentit la capture sur certains téléphones : désactivé par défaut pour des trainées nettes</span>
            </span>
            <input type="checkbox" id="toggle-video-recording" class="switch-input" />
            <span class="switch" aria-hidden="true"></span>
          </label>

          <div class="settings-row">
            <span class="settings-row-label">Format photo</span>
            <div id="segment-photo-format" class="segmented" role="group" aria-label="Format photo">
              <button type="button" class="segmented-btn" data-value="jpeg">JPEG</button>
              <button type="button" class="segmented-btn" data-value="png">PNG</button>
            </div>
          </div>

          <label class="settings-row">
            <span class="settings-row-label">
              Grille de cadrage
              <span class="settings-row-hint">Repères pour composer l'image</span>
            </span>
            <input type="checkbox" id="toggle-grid" class="switch-input" />
            <span class="switch" aria-hidden="true"></span>
          </label>

          <label class="settings-row">
            <span class="settings-row-label">
              Miroir caméra avant
              <span class="settings-row-hint">Enregistre la photo comme affichée à l'écran</span>
            </span>
            <input type="checkbox" id="toggle-mirror" class="switch-input" />
            <span class="switch" aria-hidden="true"></span>
          </label>

          <label class="settings-row">
            <span class="settings-row-label">Vibrations</span>
            <input type="checkbox" id="toggle-haptics" class="switch-input" />
            <span class="switch" aria-hidden="true"></span>
          </label>
        </div>

        <div class="settings-section">
          <h2 class="settings-section-title">Rendu des trainées</h2>

          <label class="settings-row">
            <span class="settings-row-label">
              Masque de mouvement
              <span class="settings-row-hint">Fond stable, seule la trainée s'accumule</span>
            </span>
            <input type="checkbox" id="toggle-motion-mask" class="switch-input" />
            <span class="switch" aria-hidden="true"></span>
          </label>

          <div class="settings-row">
            <span class="settings-row-label">Sensibilité</span>
            <div id="segment-sensitivity" class="segmented" role="group" aria-label="Sensibilité du masque">
              <button type="button" class="segmented-btn" data-value="low">Faible</button>
              <button type="button" class="segmented-btn" data-value="medium">Moyenne</button>
              <button type="button" class="segmented-btn" data-value="high">Élevée</button>
            </div>
          </div>

          <label class="settings-row">
            <span class="settings-row-label">
              Vidéo accélérée
              <span class="settings-row-hint">Timelapse de la construction de la trainée</span>
            </span>
            <input type="checkbox" id="toggle-timelapse" class="switch-input" />
            <span class="switch" aria-hidden="true"></span>
          </label>
        </div>

        <div class="settings-section">
          <h2 class="settings-section-title">Stockage</h2>
          <p id="storage-summary" class="settings-hint-text">—</p>
          <button id="btn-clear-gallery" class="danger-btn" type="button">Vider la galerie</button>
        </div>

        <p class="settings-version">Lightpainting</p>
      </div>
    </section>

  </div>

  <script src="js/db.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/motion-mask.js"></script>
  <script src="js/capture-engine.js"></script>
  <script src="js/recorder.js"></script>
  <script src="js/timelapse.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
